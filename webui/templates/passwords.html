{% extends "base.html" %}
{% block title %}Cracked passwords — PenDonn{% endblock %}
{% block page_title %}Cracked passwords{% endblock %}

{% block content %}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <div class="text-sm text-amber-700 dark:text-amber-300 bg-amber-50 dark:bg-amber-950/40 border border-amber-200 dark:border-amber-900 rounded-md px-3 py-2 flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v3.75m0 3.75h.008v.008H12V16.5zM2.697 19.5h18.606c1.54 0 2.502-1.667 1.732-3L13.732 4.5c-.77-1.333-2.694-1.333-3.464 0L.965 16.5c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Passwords are stored in plaintext. Mind your shoulder.</span>
        </div>
        <span hx-get="/partials/passwords"
              hx-target="#passwords-table"
              hx-swap="outerHTML"
              hx-trigger="every 15s"
              class="inline-flex items-center gap-1 text-xs text-slate-500 dark:text-slate-400">
            <span class="w-1.5 h-1.5 rounded-full bg-ok animate-pulse"></span>
            Live (15s)
        </span>
    </div>

    {% include "partials/passwords_table.html" %}
</div>
{% endblock %}
